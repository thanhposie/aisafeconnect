name: CI/CD — AiSafeConnect

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Kiểm thử Backend API
  # ──────────────────────────────────────────────
  test-backend:
    name: 🧪 Chạy API Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aisafeconnect/server/package-lock.json

      - name: Cài dependencies Backend
        working-directory: aisafeconnect/server
        run: npm ci

      - name: Khởi động server nền
        working-directory: aisafeconnect/server
        run: node server.js &
        env:
          PORT: 3000
          # Không có DB → fallback file JSON (đủ để test)

      - name: Đợi server sẵn sàng
        run: |
          echo "Chờ server khởi động..."
          for i in $(seq 1 15); do
            if curl -s http://localhost:3000/api/session > /dev/null; then
              echo "✅ Server đã sẵn sàng!"
              break
            fi
            echo "  Lần $i: chờ..."
            sleep 2
          done

      - name: Chạy test-runner.js
        working-directory: aisafeconnect/server
        run: node test-runner.js

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: aisafeconnect/test-report.html
          retention-days: 30

  # ──────────────────────────────────────────────
  # JOB 2: Build Frontend React
  # ──────────────────────────────────────────────
  build-frontend:
    name: 🔨 Build Frontend
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aisafeconnect/package-lock.json

      - name: Cài dependencies Frontend
        working-directory: aisafeconnect
        run: npm ci

      - name: Lint code
        working-directory: aisafeconnect
        run: npm run lint || true   # Cảnh báo nhưng không dừng pipeline

      - name: Build production
        working-directory: aisafeconnect
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: aisafeconnect/dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 3: Deploy (chỉ chạy khi push vào main)
  # ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy lên Server
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Tải frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Deploy Backend qua SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "=== Deploy Backend ==="
            cd ${{ secrets.DEPLOY_PATH }}/server

            # Pull code mới nhất
            git pull origin main

            # Cài dependencies mới (nếu có)
            npm ci --production

            # Khởi động lại server bằng PM2
            if pm2 list | grep -q "safeconnect"; then
              pm2 restart safeconnect
            else
              pm2 start server.js --name safeconnect
            fi

            pm2 save
            echo "✅ Backend deployed!"

      - name: Deploy Frontend qua FTP/SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "dist/*"
          target: ${{ secrets.FRONTEND_PATH }}
          strip_components: 1

      - name: Thông báo deploy thành công
        if: success()
        run: |
          echo "🎉 Deploy thành công!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Người deploy: ${{ github.actor }}"
